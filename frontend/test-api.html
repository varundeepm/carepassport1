<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:5000/api/health');
                const data = await response.json();
                resultDiv.innerHTML = `<p>✅ API is working: ${JSON.stringify(data)}</p>`;
                
                // Test the specific endpoint the doctor dashboard uses
                const patientsResponse = await fetch('http://localhost:5000/api/doctors/1/patients');
                const patientsData = await patientsResponse.json();
                resultDiv.innerHTML += `<p>✅ Patients API is working: ${JSON.stringify(patientsData)}</p>`;
                
            } catch (error) {
                resultDiv.innerHTML = `<p>❌ Error: ${error.message}</p>`;
                console.error('API Test Error:', error);
            }
        }
    </script>
</body>
</html>
